services:
  postgres:
    image: postgres:16-alpine
    container_name: makmur_jaya_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: makmur_jaya_pharmacy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: makmur_jaya_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

volumes:
  pgdata:
  redisdata:
