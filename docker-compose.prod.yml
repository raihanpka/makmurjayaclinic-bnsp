services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic_app_prod
    restart: always
    environment:
      - NODE_ENV=production
      - APP_KEY=${APP_KEY:-yoursupersecretappkeythathastobeatleast32chars}
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=info
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-clinic_bnsp}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_REDIS_HOST=redis
      - QUEUE_REDIS_PORT=6379
      - CACHE_VIEWS=true
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Menjalankan migrasi database terlebih dahulu, lalu menjalankan server web
    command: sh -c "node build/ace.js migration:run --force && node build/bin/server.js"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic_worker_prod
    restart: always
    environment:
      - NODE_ENV=production
      - APP_KEY=${APP_KEY:-yoursupersecretappkeythathastobeatleast32chars}
      - LOG_LEVEL=info
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-clinic_bnsp}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_REDIS_HOST=redis
      - QUEUE_REDIS_PORT=6379
    depends_on:
      app:
        condition: service_started
    # Menjalankan antrian BullMQ
    command: node build/ace.js queue:listen

  postgres:
    image: postgres:16-alpine
    container_name: clinic_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-clinic_bnsp}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clinic_redis_prod
    restart: always
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
  redis_data_prod:
